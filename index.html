<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>履歷 - 114018091</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #e9ecf3;
    }

    .resume {
      width: 800px;
      height: 1100px;
      margin: 30px auto;
      background: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      display: grid;
      grid-template-columns: 260px 1fr;
    }

    .left {
      background: #2f3b52;
      color: white;
      padding: 30px 20px;
      text-align: center;
    }

    .left img {
      width: 140px;
      height: 180px;
      object-fit: cover;
      border-radius: 50%;
      margin-bottom: 15px;
      border: 3px solid white;
    }

    .right {
      padding: 30px;
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    .section {
      margin-bottom: 25px;
    }

    .section h3 {
      margin-bottom: 10px;
      border-left: 5px solid #2f3b52;
      padding-left: 10px;
    }

    ul {
      margin: 0;
      padding-left: 20px;
    }

    .tag {
      display: inline-block;
      background: #2f3b52;
      color: white;
      padding: 6px 10px;
      border-radius: 15px;
      margin: 5px 5px 0 0;
      font-size: 12px;
    }

    .btn {
      margin-top: 20px;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #2f3b52;
      color: white;
      cursor: pointer;
    }

    .btn:hover {
      opacity: 0.85;
    }

    /* 音樂播放器固定在右下角（比較好看） */
    .music {
      position: fixed;
      bottom: 20px;
      right: 20px;
    }
  </style>
</head>
<body>

<!-- 音樂（已修好） -->
<div class="music">
  <audio controls autoplay muted>
    <source src="mp3/bg.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>
</div>

<div class="resume">

  <!-- 左側 -->
  <div class="left">
    <img src="images/photo.jpg" alt="個人照片">
    <h2>劉紜熏</h2>
    <p>學號：114018091</p>
    <p>email@example.com</p>
  </div>

  <!-- 右側 -->
  <div class="right">
    <h1>個人履歷 Resume</h1>

    <div class="section">
      <h3>自我介紹</h3>
      <p id="intro">我是一位具備同理心與觀察力的人，對心理學與人際互動有高度興趣。</p>
    </div>

    <div class="section">
      <h3>學歷</h3>
      <ul>
        <li>XXX 高中 / 大學（自己改）</li>
      </ul>
    </div>

    <div class="section">
      <h3>技能</h3>
      <span class="tag">溝通能力</span>
      <span class="tag">HTML</span>
      <span class="tag">CSS</span>
      <span class="tag">JavaScript</span>
    </div>

    <div class="section">
      <h3>興趣</h3>
      <ul>
        <li>閱讀</li>
        <li>音樂</li>
        <li>觀察人類行為</li>
      </ul>
    </div>

    <button class="btn" onclick="changeIntro()">換一句自介</button>
  </div>

</div>

<script>
function changeIntro() {
  const texts = [
    "我擅長傾聽與理解他人，是一個重視人際連結的人。",
    "我對心理學充滿熱情，希望未來能幫助他人。",
    "我擁有良好的觀察力與同理心，能察覺他人情緒。"
  ];

  const random = Math.floor(Math.random() * texts.length);
  document.getElementById("intro").innerText = texts[random];
}
</script>

</body>
</html>
